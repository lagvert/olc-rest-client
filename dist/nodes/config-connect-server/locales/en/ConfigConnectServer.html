<script type="text/html" data-help-name="OL Connect Server">
  <p>OL Connect Server connection settings, including credentials.</p>
  <h4>URL</h4>
  <p>
    The base URL of an OL Connect Server. This OL Connect Server setting can be found in the Connect Server Configuration tool.<br> The URL is the base URL, not the full path to a specific endpoint.
  </p>
  <h4>Username</h4>
  <p>The username that must be used to connect to the OL Connect Server.</p>
  <h4>Password</h4>
  <p>A secret phrase, configured on the OL Connect Server, that allows the node(s) to interact with that server.
  </p>
  <h4>Ignore certificate errors</h4>
  <p>If selected, connection errors caused by a self-signed certificate will be ignored.
  </p>
  <h4>Max concurrent request</h4>
  <p>
    Limits the number of requests sent to the OL Connect Server API at the same time. The default value is <b>30</b>.
    You can set this value between <b>15</b> and <b>100</b> depending on your requirements and server capacity.
  </p>
  <h4>Show progress below nodes</h4>
  <p>By default, the progress percentage is displayed on production nodes, such as the all-in-one.
    This increases traffic between the server and the client.
    If not selected, progress calls to the server are ignored, and no progress percentage is displayed on production nodes.
  </p>
  <h3>Details</h3>
  <p>Note: the Username and Password fields can be omitted if the Connect Server does not have security enabled.</p>
  <p>
    The OL Connect server connection settings are shared with multiple, if not all, OL Connect plugin nodes.
  </p>
  <h4>Error handling</h4>
  <p>
    OL Connect nodes throw errors that can be caught with a <b>catch</b>
    node. If an error occurs, the OL Connect Server passes the error messages and the HTTP response code via <code>msg.olError</code>. This object is structured as follows.
  </p>
  <dl>
    <dt>
      errorCode<span class="property-type">string</span>
    </dt>
    <dd>The error name (e.g. TemplateNotFound).</dd>
    <dt>
      olConnectServer<span class="property-type">object</span>
    </dt>
    <dd>In case of an OL Connect error, this object contains the following information.
      <dl>
        <dt>
          statusCode<span class="property-type">string</span>
        </dt>
        <dd>The HTTP error code (e.g. 404).</dd>
        <dt>
          serverMessage<span class="property-type">string</span>
        </dt>
        <dd>The error message returned by the OL Connect Server.</dd>
      </dl>
    </dd>
  </dl>
</script>
